<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Realistic Predator Snake</title>
<style>
  html,body {
    margin:0;
    padding:0;
    background: #222;
    overflow:hidden;
    color:#fff;
    font-family: Arial, sans-serif;
  }
  #hud {
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
  }
  canvas {
    display:block;
    margin:0 auto;
    background:#000;
  }
</style>
</head>
<body>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="game" width="800" height="600"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreSpan = document.getElementById('score');

// Day/night cycle variables
let time = 0; // increases gradually

// Snake state
const snake = {
  segments: [],
  direction: {x:1, y:0},
  targetDir: {x:1, y:0},
  speed: 2.5,
  segmentLength: 10,
  desiredLength: 30,
};

// Predator state
const predator = {
  x: Math.random()*canvas.width,
  y: Math.random()*canvas.height,
  speed: 1.8,
};

// Food items and obstacles
let foods = [];
let obstacles = [];
let score = 0;
let gameOver = false;

function init() {
  // create initial snake segments
  for(let i=0;i<snake.desiredLength;i++){
    snake.segments.push({x:400 - i*snake.segmentLength, y:300});
  }
  spawnFood();
  spawnObstacles();
  requestAnimationFrame(gameLoop);
}

function spawnFood(){
  // Create normal, golden and poison food randomly
  const types = [
    {type:'normal', color:'green', score:10, growth:5},
    {type:'gold', color:'gold', score:50, growth:10},
    {type:'poison', color:'purple', score:-20, growth:-5}
  ];
  const choice = types[Math.floor(Math.random()*types.length)];
  foods.push({
    x: Math.random()* (canvas.width-40)+20,
    y: Math.random()* (canvas.height-40)+20,
    radius:8,
    ...choice
  });
}

function spawnObstacles(){
  for(let i=0;i<5;i++){
    obstacles.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      radius:15 + Math.random()*15,
    });
  }
}

function updateSnake(){
  // Smoothly adjust direction toward target
  snake.direction.x += (snake.targetDir.x - snake.direction.x)*0.2;
  snake.direction.y += (snake.targetDir.y - snake.direction.y)*0.2;
  const len = Math.hypot(snake.direction.x, snake.direction.y);
  snake.direction.x /= len;
  snake.direction.y /= len;

  // compute new head position
  const head = {
    x: snake.segments[0].x + snake.direction.x * snake.speed,
    y: snake.segments[0].y + snake.direction.y * snake.speed,
  };

  // bound within canvas
  if(head.x <0) head.x=canvas.width;
  if(head.y <0) head.y=canvas.height;
  if(head.x>canvas.width) head.x=0;
  if(head.y>canvas.height) head.y=0;

  // add head and remove tail if necessary
  snake.segments.unshift(head);
  while(snake.segments.length>snake.desiredLength){
    snake.segments.pop();
  }
}

function updatePredator(){
  const head = snake.segments[0];
  const dx = head.x - predator.x;
  const dy = head.y - predator.y;
  const len = Math.hypot(dx,dy);
  predator.x += dx/len * predator.speed;
  predator.y += dy/len * predator.speed;
  // wrap
  if(predator.x <0) predator.x=canvas.width;
  if(predator.y <0) predator.y=canvas.height;
  if(predator.x>canvas.width) predator.x=0;
  if(predator.y>canvas.height) predator.y=0;

  // check collision with snake head
  if(len < 15){
    gameOver = true;
  }
}

function checkCollisions(){
  const head = snake.segments[0];
  // self collision
  for(let i=4;i<snake.segments.length;i++){
    const s = snake.segments[i];
    if(Math.hypot(head.x-s.x, head.y-s.y) < snake.segmentLength/2){
      gameOver = true;
      return;
    }
  }
  // obstacles
  for(const ob of obstacles){
    if(Math.hypot(head.x-ob.x, head.y-ob.y) < ob.radius){
      gameOver = true;
      return;
    }
  }
  // foods
  for(let i=foods.length-1;i>=0;i--){
    const f = foods[i];
    if(Math.hypot(head.x-f.x, head.y-f.y) < f.radius+snake.segmentLength/2){
      snake.desiredLength += f.growth;
      score += f.score;
      foods.splice(i,1);
      spawnFood();
    }
  }
}

function drawBackground(){
  // simple day/night gradient based on time
  time += 0.002;
  const t = (Math.sin(time)+1)/2; // 0..1
  const grad = ctx.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0,`rgb(${20+80*t}, ${30+80*t}, ${20+80*t})`);
  grad.addColorStop(1,`rgb(${10+40*t}, ${20+40*t}, ${10+40*t})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawSnake(){
  for(let i=snake.segments.length-1;i>=0;i--){
    const seg = snake.segments[i];
    const size = snake.segmentLength;
    const hue = 120 + i*0.5; // slight gradient along body
    ctx.fillStyle = `hsl(${hue},70%,40%)`;
    ctx.beginPath();
    ctx.arc(seg.x, seg.y, size/2, 0, Math.PI*2);
    ctx.fill();
  }
  // eyes on head
  const head = snake.segments[0];
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(head.x+3, head.y-3, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.arc(head.x+3, head.y+3, 2, 0, Math.PI*2); ctx.fill();
}

function drawPredator(){
  ctx.fillStyle = 'red';
  ctx.beginPath();
  ctx.arc(predator.x, predator.y, 12, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle='white';
  ctx.beginPath();
  ctx.arc(predator.x-3, predator.y-3,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.arc(predator.x-3, predator.y+3,2,0,Math.PI*2); ctx.fill();
}

function drawFoods(){
  for(const f of foods){
    ctx.fillStyle = f.color;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.radius, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawObstacles(){
  ctx.fillStyle = '#555';
  for(const ob of obstacles){
    ctx.beginPath();
    ctx.arc(ob.x, ob.y, ob.radius, 0, Math.PI*2);
    ctx.fill();
  }
}

function gameLoop(){
  if(gameOver){
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#fff';
    ctx.font='48px Arial';
    ctx.textAlign='center';
    ctx.fillText('Game Over', canvas.width/2, canvas.height/2);
    return;
  }
  drawBackground();
  updateSnake();
  updatePredator();
  checkCollisions();
  drawObstacles();
  drawFoods();
  drawSnake();
  drawPredator();
  scoreSpan.textContent = score;
  requestAnimationFrame(gameLoop);
}

window.addEventListener('keydown', e=>{
  if(e.key==='ArrowUp') snake.targetDir = {x:0, y:-1};
  if(e.key==='ArrowDown') snake.targetDir = {x:0, y:1};
  if(e.key==='ArrowLeft') snake.targetDir = {x:-1, y:0};
  if(e.key==='ArrowRight') snake.targetDir = {x:1, y:0};
});

init();
</script>
</body>
</html>
